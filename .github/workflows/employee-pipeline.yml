name: Enterprise Employee Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  NVIDIA_API_URL: "https://integrate.api.nvidia.com/v1/chat/completions"
  NVIDIA_MODEL: "meta/llama-3.1-70b-instruct"
  # Where every agent writes its own markdown report as it completes.
  REPORTS_DIR: reports

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Build
  # ----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 4. Build (skip tests)
        run: mvn -B -ntp -DskipTests package

      - name: 5. Build report (Build agent)
        if: always()
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          JAR="target/employee-management.jar"
          JAR_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          SHA=$(sha256sum "$JAR" 2>/dev/null | cut -d' ' -f1 || echo "n/a")
          STATUS="${{ job.status }}"
          cat > "${{ env.REPORTS_DIR }}/report-build.md" <<EOF
          # 🏗️ Build Agent Report

          | Field | Value |
          |---|---|
          | **Agent** | Build |
          | **Status** | ${STATUS} |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **JAR** | \`${JAR}\` |
          | **Size** | ${JAR_SIZE} bytes |
          | **SHA-256** | \`${SHA}\` |
          | **Java** | ${{ env.JAVA_VERSION }} |
          EOF
          echo "### 🏗️ Build Agent — finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** \`${{ job.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact:** \`report-build\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 6. Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-build
          path: ${{ env.REPORTS_DIR }}/report-build.md
          if-no-files-found: warn
          retention-days: 30

      - name: 7. Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/employee-management.jar
        continue-on-error: true

  # ----------------------------------------------------------------------
  # JOB 2: Test & Coverage
  # ----------------------------------------------------------------------
  test-coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 4. Run Unit Tests
        run: mvn -B -ntp test

      - name: 5. Generate JaCoCo Reports
        run: |
          mvn -B -ntp jacoco:report
          mvn -B -ntp jacoco:report -Dformat=csv
          mvn -B -ntp jacoco:report -Dformat=xml

      - name: 6. Coverage gate (>= 80%)
        id: coverage-gate
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          COVERAGE="0"
          TESTS=$(find target/surefire-reports -name 'TEST-*.xml' 2>/dev/null | wc -l)
          FAILURES=$(grep -hoE 'failures="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F\" '{s+=$2} END{print s+0}')
          ERRORS=$(grep -hoE 'errors="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F\" '{s+=$2} END{print s+0}')
          SKIPPED=$(grep -hoE 'skipped="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F\" '{s+=$2} END{print s+0}')
          if [ -f target/site/jacoco/jacoco.csv ]; then
            COVERAGE=$(awk -F, 'NR>1 && $1=="INSTRUCTION" && $4!="0" {print $4; exit}' target/site/jacoco/jacoco.csv)
          fi
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "failures=${FAILURES}" >> "$GITHUB_OUTPUT"
          cat > "${{ env.REPORTS_DIR }}/report-test-coverage.md" <<EOF
          # 🧪 Test & Coverage Agent Report

          | Field | Value |
          |---|---|
          | **Agent** | Test & Coverage |
          | **Status** | ${{ job.status }} |
          | **Test files** | ${TESTS} |
          | **Failures** | ${FAILURES} |
          | **Errors** | ${ERRORS} |
          | **Skipped** | ${SKIPPED} |
          | **Instruction Coverage** | ${COVERAGE}% |
          | **Threshold** | 80% |
          | **Gate** | $( [ -n "$COVERAGE" ] && [ "${COVERAGE%.*}" -ge 80 ] && echo "✅ PASS" || echo "❌ FAIL" ) |
          EOF
          echo "### 🧪 Test & Coverage Agent — finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** \`${{ job.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Instruction coverage:** ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact:** \`report-test-coverage\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$COVERAGE" ] && [ "${COVERAGE%.*}" -lt 80 ]; then
            echo "::error::Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi

      - name: 7. Upload Test & Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-test-coverage
          path: ${{ env.REPORTS_DIR }}/report-test-coverage.md
          if-no-files-found: warn
          retention-days: 30

      - name: 8. Upload JaCoCo + JUnit reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/**
            target/surefire-reports/**
        continue-on-error: true

  # ----------------------------------------------------------------------
  # JOB 3: NVIDIA Test Coverage Agent
  # ----------------------------------------------------------------------
  nvidia-test-agent:
    name: NVIDIA Test Coverage Agent
    runs-on: ubuntu-latest
    needs: test-coverage
    permissions:
      contents: read
      actions: read
    if: always()

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: target
        continue-on-error: true

      - name: 4. Run NVIDIA Test Coverage Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          python3 scripts/test-agent.py \
            --junit target/surefire-reports \
            --jacoco target/site/jacoco/jacoco.csv \
            --source src/main/java \
            --output reports/coverage-summary.md || echo "Test agent failed - continuing"

      - name: 5. Per-agent report (NVIDIA Test Coverage)
        if: always()
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          AGENT="nvidia-test-agent"
          STATUS="${{ job.status }}"
          SRC="reports/coverage-summary.md"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "# 🤖 NVIDIA Test Coverage Agent Report"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Agent** | ${AGENT} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Finished** | ${TS} |"
            echo "| **Model** | ${{ env.NVIDIA_MODEL }} |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo
            echo "## Generated analysis"
            echo
            if [ -f "$SRC" ]; then
              cat "$SRC"
            else
              echo "_No coverage summary produced by agent._"
            fi
          } > "${{ env.REPORTS_DIR }}/report-${AGENT}.md"
          # Surface a compact live summary in the GitHub Actions UI
          {
            echo "### 🤖 NVIDIA Test Coverage Agent — finished"
            echo
            echo "- **Status:** \`${{ job.status }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Artifact:** \`report-nvidia-test-agent\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 6. Upload per-agent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-nvidia-test-agent
          path: ${{ env.REPORTS_DIR }}/report-nvidia-test-agent.md
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------
  # JOB 4: Trivy Scan
  # ----------------------------------------------------------------------
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read
      actions: read
    env:
      # Pinned so a Trivy release doesn't silently change flag semantics
      # (--skip-pom-check, --scanners, etc.) and so the version we test
      # against is reproducible.
      TRIVY_VERSION: '0.58.0'
      # Skip Java POM lookups in the FS scan to avoid the 429 rate-limit
      # storm from repo.maven.apache.org that the original gate was
      # masking with "report not produced".
      TRIVY_SKIP_POM_CHECK: 'true'

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Trivy (pinned version, official install script)
        # The previous apt-based install was the root cause of the
        # "Trivy filesystem report not produced - skipping gate" message:
        # on a fresh runner the apt-get of `trivy` either pulled an
        # ancient 0.32 (no --skip-pom-check), or one of the wget/gpg
        # steps timed out and the whole install was rolled back, leaving
        # no binary on PATH. The script below is the install method
        # recommended by aquasecurity/trivy for GitHub Actions.
        run: |
          set -euo pipefail
          echo "Installing Trivy v${TRIVY_VERSION}..."
          if command -v trivy >/dev/null 2>&1; then
            echo "Trivy already present: $(trivy --version)"
            exit 0
          fi
          TMP_DIR="$(mktemp -d)"
          cd "${TMP_DIR}"
          # Download the official release tarball
          curl -fsSL -o trivy.tgz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tgz
          sudo install -m 0755 trivy /usr/local/bin/trivy
          cd -
          rm -rf "${TMP_DIR}"
          trivy --version
          echo "Trivy ${TRIVY_VERSION} installed at $(command -v trivy)"

      - name: 3. Restore Trivy vulnerability DB cache
        # Trivy downloads its vuln DB on every cold run. On shared CI
        # infrastructure that hits ghcr.io rate limits, and the resulting
        # download failure is what was producing an empty trivy-report.json
        # and tripping the "skipping gate" branch. Cache the DB on GHA.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/Library/Caches/trivy
          key: trivy-db-${{ runner.os }}-${{ env.TRIVY_VERSION }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: 4. Sanity check Trivy + DB
        id: sanity
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1; then
            echo "::error::Trivy binary is not on PATH after install step"
            exit 1
          fi
          echo "Trivy version: $(trivy --version)"
          # Trigger an explicit DB update so the first real scan doesn't
          # fail with a 429 if the cache was cold.
          trivy --quiet image --download-db-only
          echo "trivy_binary=$(command -v trivy)" >> "$GITHUB_OUTPUT"

      - name: 5. Trivy Filesystem Scan
        id: fs-scan
        # We never want a scan failure to silently produce no report.
        # Capture stdout/stderr, ALWAYS emit trivy-report.json (even an
        # empty one with an "_error" field), and only then decide the gate.
        run: |
          set -uo pipefail
          mkdir -p reports
          SCAN_TARGET="."
          SCAN_OUT="trivy-report.json"
          SCAN_LOG="trivy-fs.log"
          echo "Running: trivy fs on ${SCAN_TARGET}"
          set +e
          trivy fs \
            --format json \
            --output "${SCAN_OUT}" \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignore-unfixed \
            --skip-pom-check \
            --scanners vuln,secret,misconfig \
            --timeout 15m \
            "${SCAN_TARGET}" 2> "${SCAN_LOG}"
          RC=$?
          set -e
          echo "Trivy fs exit code: ${RC}"
          echo "trivy_fs_rc=${RC}" >> "$GITHUB_OUTPUT"
          if [ -s "${SCAN_OUT}" ]; then
            SIZE=$(stat -c%s "${SCAN_OUT}")
            echo "Trivy fs report size: ${SIZE} bytes"
          else
            echo "::warning::Trivy fs produced no output (rc=${RC}); writing stub report"
            # Always write something parseable so the gate can read it
            cat > "${SCAN_OUT}" <<EOF
          {
            "SchemaVersion": 2,
            "ArtifactName": "${SCAN_TARGET}",
            "ArtifactType": "filesystem",
            "Results": [],
            "_scanError": "trivy fs exited with code ${RC}; see trivy-fs.log"
          }
          EOF
          fi
          echo "---- trivy-fs.log (tail) ----"
          tail -n 200 "${SCAN_LOG}" || true
          echo "-----------------------------"

      - name: 6. Trivy Image Scan
        id: img-scan
        run: |
          set -uo pipefail
          SCAN_OUT="trivy-image-report.json"
          SCAN_LOG="trivy-image.log"
          echo "Running: trivy image eclipse-temurin:21-jre-jammy"
          set +e
          trivy image \
            --format json \
            --output "${SCAN_OUT}" \
            --severity CRITICAL,HIGH \
            --timeout 15m \
            eclipse-temurin:21-jre-jammy 2> "${SCAN_LOG}"
          RC=$?
          set -e
          echo "Trivy image exit code: ${RC}"
          echo "trivy_image_rc=${RC}" >> "$GITHUB_OUTPUT"
          if [ ! -s "${SCAN_OUT}" ]; then
            echo "::warning::Trivy image produced no output (rc=${RC}); writing stub report"
            cat > "${SCAN_OUT}" <<EOF
          {
            "SchemaVersion": 2,
            "ArtifactName": "eclipse-temurin:21-jre-jammy",
            "ArtifactType": "container_image",
            "Results": [],
            "_scanError": "trivy image exited with code ${RC}; see trivy-image.log"
          }
          EOF
          fi
          echo "---- trivy-image.log (tail) ----"
          tail -n 200 "${SCAN_LOG}" || true
          echo "--------------------------------"

      - name: 7. Trivy gate + per-agent report (Trivy)
        if: always()
        env:
          TRIVY_FS_RC: ${{ steps.fs-scan.outputs.trivy_fs_rc }}
          TRIVY_IMAGE_RC: ${{ steps.img-scan.outputs.trivy_image_rc }}
        run: |
          set -uo pipefail
          mkdir -p "${{ env.REPORTS_DIR }}"
          AGENT="trivy-scan"
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CRIT_FS=0; HIGH_FS=0; MED_FS=0; LOW_FS=0
          CRIT_IMG=0; HIGH_IMG=0
          GATE="✅ PASS"
          GATE_REASON="No CRITICAL/HIGH vulnerabilities."

          # Filesystem counts
          if [ -s trivy-report.json ] && jq -e . trivy-report.json >/dev/null 2>&1; then
            CRIT_FS=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
            HIGH_FS=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length'     trivy-report.json 2>/dev/null || echo 0)
            MED_FS=$(jq  '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length'   trivy-report.json 2>/dev/null || echo 0)
            LOW_FS=$(jq  '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length'      trivy-report.json 2>/dev/null || echo 0)
            SCAN_ERR=$(jq -r '._scanError // ""' trivy-report.json 2>/dev/null || echo "")
          else
            SCAN_ERR="trivy-report.json is missing or not valid JSON"
          fi

          # Image counts
          if [ -s trivy-image-report.json ] && jq -e . trivy-image-report.json >/dev/null 2>&1; then
            CRIT_IMG=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image-report.json 2>/dev/null || echo 0)
            HIGH_IMG=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length'     trivy-image-report.json 2>/dev/null || echo 0)
          fi

          # Decide gate outcome with the real reason
          if [ "${TRIVY_FS_RC:-0}" != "0" ] || [ "${TRIVY_IMAGE_RC:-0}" != "0" ]; then
            GATE="❌ FAIL"
            GATE_REASON="Trivy scan(s) returned non-zero exit code (fs=${TRIVY_FS_RC:-?}, image=${TRIVY_IMAGE_RC:-?}). See trivy-fs.log / trivy-image.log."
            echo "::error::${GATE_REASON}"
          elif [ -n "${SCAN_ERR:-}" ]; then
            GATE="⚠️ INCONCLUSIVE"
            GATE_REASON="${SCAN_ERR}"
            echo "::warning::${GATE_REASON}"
          elif [ "${CRIT_FS:-0}" -gt 0 ] || [ "${HIGH_FS:-0}" -gt 0 ] || [ "${CRIT_IMG:-0}" -gt 0 ] || [ "${HIGH_IMG:-0}" -gt 0 ]; then
            GATE="❌ FAIL"
            GATE_REASON="Critical/High findings: fs CRIT=${CRIT_FS} HIGH=${HIGH_FS}; image CRIT=${CRIT_IMG} HIGH=${HIGH_IMG}."
            echo "::error::${GATE_REASON}"
          fi

          {
            echo "# 🛡️ Trivy Scan Agent Report"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Agent** | ${AGENT} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Finished** | ${TS} |"
            echo "| **Trivy version** | v${{ env.TRIVY_VERSION }} |"
            echo "| **FS scan exit code** | \`${TRIVY_FS_RC:-?}\` |"
            echo "| **Image scan exit code** | \`${TRIVY_IMAGE_RC:-?}\` |"
            echo "| **Gate (CRIT/HIGH)** | ${GATE} |"
            echo "| **Gate reason** | ${GATE_REASON} |"
            echo
            echo "## Filesystem findings"
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| CRITICAL | ${CRIT_FS} |"
            echo "| HIGH     | ${HIGH_FS} |"
            echo "| MEDIUM   | ${MED_FS} |"
            echo "| LOW      | ${LOW_FS} |"
            echo
            echo "## Image findings (eclipse-temurin:21-jre-jammy)"
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| CRITICAL | ${CRIT_IMG} |"
            echo "| HIGH     | ${HIGH_IMG} |"
            echo
            if [ -n "${SCAN_ERR:-}" ]; then
              echo "## Scan error"
              echo
              echo '```'
              echo "${SCAN_ERR}"
              echo '```'
            fi
          } > "${{ env.REPORTS_DIR }}/report-${AGENT}.md"
          echo "### 🛡️ Trivy Scan Agent — finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** \`${{ job.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gate (CRIT/HIGH):** ${GATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:** ${GATE_REASON}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact:** \`report-trivy-scan\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "$GATE" = "❌ FAIL" ]; then
            echo "::error::Critical/High vulnerabilities detected by Trivy"
            exit 1
          fi

      - name: 8. Upload Trivy raw JSON + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report.json
            trivy-image-report.json
            trivy-fs.log
            trivy-image.log
          if-no-files-found: warn
          retention-days: 30

      - name: 9. Upload per-agent Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-trivy-scan
          path: ${{ env.REPORTS_DIR }}/report-trivy-scan.md
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------
  # JOB 5: NVIDIA Security Review Agent
  # ----------------------------------------------------------------------
  nvidia-security-agent:
    name: NVIDIA Security Review Agent
    runs-on: ubuntu-latest
    needs: trivy-scan
    permissions:
      contents: read
      actions: read
    if: always()

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Download Trivy artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: .
        continue-on-error: true

      - name: 4. Run NVIDIA Security Review Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          if [ -f trivy-report.json ]; then
            python3 scripts/security-agent.py \
              --trivy trivy-report.json \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --config src/main/resources/application.yml \
              --source src/main/java \
              --output reports/security-report.md || echo "Security agent failed - continuing"
          else
            echo "# Security Report" > reports/security-report.md
            echo "Trivy report not available." >> reports/security-report.md
          fi

      - name: 5. Per-agent report (NVIDIA Security Review)
        if: always()
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          AGENT="nvidia-security-agent"
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "# 🔒 NVIDIA Security Review Agent Report"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Agent** | ${AGENT} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Finished** | ${TS} |"
            echo "| **Model** | ${{ env.NVIDIA_MODEL }} |"
            echo
            if [ -f reports/security-report.md ]; then
              cat reports/security-report.md
            else
              echo "_No security report produced by agent._"
            fi
          } > "${{ env.REPORTS_DIR }}/report-${AGENT}.md"
          {
            echo "### 🔒 NVIDIA Security Review Agent — finished"
            echo
            echo "- **Status:** \`${{ job.status }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Artifact:** \`report-nvidia-security-agent\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 6. Upload per-agent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-nvidia-security-agent
          path: ${{ env.REPORTS_DIR }}/report-nvidia-security-agent.md
          if-no-files-found: warn
          retention-days: 30

      - name: 7. Upload raw security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-security-report
          path: reports/security-report.md
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------
  # JOB 6: NVIDIA Auto Remediation Agent
  # ----------------------------------------------------------------------
  nvidia-remediation-agent:
    name: NVIDIA Auto Remediation Agent
    runs-on: ubuntu-latest
    needs: [trivy-scan, nvidia-security-agent]
    permissions:
      contents: write
      actions: read
      # Required so the agent can push the patched branch back if it commits fixes
    if: always()

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Download Trivy artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: .
        continue-on-error: true

      - name: 4. Download security report artifact
        uses: actions/download-artifact@v4
        with:
          name: nvidia-security-report
          path: reports
        continue-on-error: true

      - name: 5. Run NVIDIA Auto Remediation Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -f trivy-report.json ]; then
            python3 scripts/security-fix-agent.py \
              --trivy trivy-report.json \
              --security-report reports/security-report.md \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --source src/main/java \
              --config src/main/resources/application.yml \
              --output-dir reports/ || echo "Remediation agent failed - continuing"
          fi

      - name: 6. Per-agent report (NVIDIA Auto Remediation)
        if: always()
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          AGENT="nvidia-remediation-agent"
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FIX_SUMMARY="reports/security-fix-summary.md"
          PATCHED="reports/patched-files.md"
          FIX_LOG="reports/fix-log.md"
          {
            echo "# 🛠️ NVIDIA Auto Remediation Agent Report"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Agent** | ${AGENT} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Finished** | ${TS} |"
            echo "| **Model** | ${{ env.NVIDIA_MODEL }} |"
            echo
            for f in "$FIX_SUMMARY" "$PATCHED" "$FIX_LOG"; do
              if [ -f "$f" ]; then
                echo "## $(basename "$f")"
                echo
                cat "$f"
                echo
              fi
            done
          } > "${{ env.REPORTS_DIR }}/report-${AGENT}.md"
          {
            echo "### 🛠️ NVIDIA Auto Remediation Agent — finished"
            echo
            echo "- **Status:** \`${{ job.status }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Artifact:** \`report-nvidia-remediation-agent\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 7. Upload per-agent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-nvidia-remediation-agent
          path: ${{ env.REPORTS_DIR }}/report-nvidia-remediation-agent.md
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------
  # JOB 7: CodeQL Analysis
  # ----------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: 4. Build for CodeQL
        run: mvn -B -ntp -DskipTests package
        continue-on-error: true

      - name: 5. Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          output: codeql-results.sarif
        continue-on-error: true

      - name: 6. Upload CodeQL SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results.sarif
        continue-on-error: true

      - name: 7. Per-agent report (CodeQL)
        if: always()
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          AGENT="codeql"
          STATUS="${{ job.status }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Parse SARIF
          CRIT=0; HIGH=0; MED=0; LOW=0
          if [ -f codeql-results.sarif ]; then
            CRIT=$(jq '[.runs[]?.results[]? | select(.level=="error")]   | length' codeql-results.sarif 2>/dev/null || echo 0)
            HIGH=$(jq '[.runs[]?.results[]? | select(.level=="warning")] | length' codeql-results.sarif 2>/dev/null || echo 0)
            MED=$(jq  '[.runs[]?.results[]? | select(.level=="note")]    | length' codeql-results.sarif 2>/dev/null || echo 0)
            LOW=$(jq  '[.runs[]?.results[]? | select(.level=="none")]    | length' codeql-results.sarif 2>/dev/null || echo 0)
          fi
          {
            echo "# 🧬 CodeQL Analysis Agent Report"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Agent** | ${AGENT} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Finished** | ${TS} |"
            echo "| **Language** | Java |"
            echo
            echo "## Findings"
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| error   | ${CRIT} |"
            echo "| warning | ${HIGH} |"
            echo "| note    | ${MED} |"
            echo "| none    | ${LOW} |"
          } > "${{ env.REPORTS_DIR }}/report-${AGENT}.md"
          {
            echo "### 🧬 CodeQL Analysis Agent — finished"
            echo
            echo "- **Status:** \`${{ job.status }}\`"
            echo "- **Language:** java"
            echo "- **Artifact:** \`report-codeql\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 8. Upload per-agent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-codeql
          path: ${{ env.REPORTS_DIR }}/report-codeql.md
          if-no-files-found: warn
          retention-days: 30

  # ----------------------------------------------------------------------
  # JOB 8: Aggregate every per-agent report into one pipeline report
  # ----------------------------------------------------------------------
  aggregate-reports:
    name: Aggregate Pipeline Report
    runs-on: ubuntu-latest
    needs:
      - build
      - test-coverage
      - nvidia-test-agent
      - trivy-scan
      - nvidia-security-agent
      - nvidia-remediation-agent
      - codeql
    if: always()
    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Download every per-agent report
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: agent-reports
          merge-multiple: true
        continue-on-error: true

      - name: 3. Discover all per-agent report files
        id: discover
        run: |
          set -euo pipefail
          echo "Available per-agent reports:"
          ls -la agent-reports 2>/dev/null || echo "(none downloaded)"
          # Stable ordering of agents in the aggregate
          AGENTS=(
            "build"
            "test-coverage"
            "nvidia-test-agent"
            "trivy-scan"
            "nvidia-security-agent"
            "nvidia-remediation-agent"
            "codeql"
          )
          printf '%s\n' "${AGENTS[@]}" | jq -R . | jq -cs '{agents: .}' > agent-order.json
          echo "agents=${AGENTS[@]}" >> "$GITHUB_OUTPUT"

      - name: 4. Build aggregate report
        run: |
          set -euo pipefail
          mkdir -p reports
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          OUT="reports/pipeline-run-report.md"
          {
            echo "# 🏭 Enterprise Employee Pipeline — Run Report"
            echo
            echo "> **One report per agent**, generated as each agent finished, then aggregated here."
            echo
            echo "## Run metadata"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Run ID** | [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` (\`${{ github.ref_name }}\`) |"
            echo "| **Generated at** | ${TS} |"
            echo
            echo "## Agent execution summary"
            echo
            echo "| # | Agent | Job status | Finished at |"
            echo "|---|---|---|---|"
            for a in build test-coverage nvidia-test-agent trivy-scan nvidia-security-agent nvidia-remediation-agent codeql; do
              STATUS=$(jq -r --arg a "$a" '.jobs[$a].result // "skipped"' "$GITHUB_STEP_SUMMARY" 2>/dev/null || true)
              if [ -z "$STATUS" ] || [ "$STATUS" = "null" ] || [ "$STATUS" = "skipped" ]; then
                # Fall back to a stable value if step summary is empty
                STATUS="${{ needs.build.result }}"  # or whichever job you're checking
              fi
              printf '| • | `%s` | %s | %s |\n' "$a" "$STATUS" "$TS"
            done
            echo
            echo "## Per-agent reports"
            echo
            for a in build test-coverage nvidia-test-agent trivy-scan nvidia-security-agent nvidia-remediation-agent codeql; do
              F="agent-reports/report-${a}.md"
              echo "### \`${a}\`"
              echo
              if [ -f "$F" ]; then
                cat "$F"
              else
                echo "_(report not produced — agent did not run or failed before emitting a report)_"
              fi
              echo
              echo "---"
              echo
            done
            echo
            echo "_End of pipeline run report._"
          } > "$OUT"
          echo "Aggregate report size: $(wc -c < "$OUT") bytes"

      - name: 5. Render status into $GITHUB_STEP_SUMMARY
        run: |
          echo "## 🏭 Pipeline run summary"
          echo
          for a in build test-coverage nvidia-test-agent trivy-scan nvidia-security-agent nvidia-remediation-agent codeql; do
            F="agent-reports/report-${a}.md"
            if [ -f "$F" ]; then
              echo "- ✅ \`${a}\` — report ready (artifact: \`report-${a}\`)"
            else
              echo "- ⚠️ \`${a}\` — no per-agent report produced"
            fi
          done
          echo
          echo "[Open full pipeline report](\`reports/pipeline-run-report.md\`)"

      - name: 6. Publish aggregate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-report
          path: reports/pipeline-run-report.md
          if-no-files-found: warn
          retention-days: 90

      - name: 7. Publish all per-agent artifacts bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-agent-reports
          path: agent-reports
          if-no-files-found: warn
          retention-days: 30

      - name: 8. Commit aggregate report back to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp reports/pipeline-run-report.md reports/pipeline-run-report.md
          # Also keep the per-agent report files in the repo for history
          cp -r agent-reports/. reports/agents/ 2>/dev/null || true
          git add reports/pipeline-run-report.md reports/agents || true
          if ! git diff --cached --quiet; then
            git commit -m "ci: refresh per-agent reports and pipeline-run-report.md [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: 9. Comment on PR with the aggregate
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/pipeline-run-report.md';
            if (!fs.existsSync(path)) { return; }
            let body = fs.readFileSync(path, 'utf8');
            if (body.length > 60000) {
              body = body.slice(0, 60000) + '\n\n_…report truncated; see workflow artifacts (`pipeline-run-report`) for full output._';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });

  # ----------------------------------------------------------------------
  # JOB 9: Deploy (only when every gate passes)
  # ----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build, test-coverage, trivy-scan, codeql]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.build.result == 'success' &&
      needs.test-coverage.result == 'success' &&
      needs.trivy-scan.result == 'success' &&
      needs.codeql.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 1. Deploy
        run: |
          echo "Build, test, coverage, security and codeql checks passed."
          echo "Deploying Employee Management service to production."
          echo "::notice::Deployment simulated for demonstration pipeline."
