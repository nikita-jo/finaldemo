name: Enterprise Employee Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  NVIDIA_API_URL: "https://integrate.api.nvidia.com/v1/chat/completions"
  NVIDIA_MODEL: "meta/llama-3.1-70b-instruct"

jobs:
  build-test-coverage:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 4. Build (skip tests)
        run: mvn -B -ntp -DskipTests package

      - name: 5. Unit Tests
        run: mvn -B -ntp test

      - name: 6. JaCoCo Coverage Report
        run: |
          mvn -B -ntp jacoco:report
          mvn -B -ntp jacoco:report -Dformat=csv
          mvn -B -ntp jacoco:report -Dformat=xml
        continue-on-error: false

      - name: 7. NVIDIA Test Coverage Agent
        if: always()
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          python3 scripts/test-agent.py \
            --junit target/surefire-reports \
            --jacoco target/site/jacoco/jacoco.csv \
            --source src/main/java \
            --output reports/coverage-summary.md || echo "Test agent failed - continuing"

      - name: 7a. Coverage gate (>= 80%)
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            COVERAGE=$(awk -F, 'NR>1 && $1=="INSTRUCTION" && $4!="0" {print $4; exit}' target/site/jacoco/jacoco.csv)
            echo "Detected line coverage: $COVERAGE"
            if [ -n "$COVERAGE" ]; then
              COVERAGE_INT=${COVERAGE%.*}
              if [ "$COVERAGE_INT" -lt 80 ]; then
                echo "::error::Coverage $COVERAGE% is below 80% threshold"
                exit 1
              fi
            fi
          fi

      - name: 8. Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
        continue-on-error: true

      - name: 8a. Trivy Image Scan (best effort)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: eclipse-temurin:21-jre-jammy
          format: json
          output: trivy-image-report.json
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: 9. NVIDIA Security Review Agent
        if: always()
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -f trivy-report.json ]; then
            python3 scripts/security-agent.py \
              --trivy trivy-report.json \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --config src/main/resources/application.yml \
              --source src/main/java \
              --output reports/security-report.md || echo "Security agent failed - continuing"
          else
            echo "# Security Report" > reports/security-report.md
            echo "Trivy report not available." >> reports/security-report.md
          fi

      - name: 9a. Fail pipeline on critical/high vulnerabilities
        run: |
          if [ -f trivy-report.json ]; then
            CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
            echo "Critical=$CRIT High=$HIGH"
            if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "::error::Critical=$CRIT, High=$HIGH vulnerabilities present"
              exit 1
            fi
          fi

      - name: 10. NVIDIA Auto Remediation Agent
        if: always()
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -f trivy-report.json ]; then
            python3 scripts/security-fix-agent.py \
              --trivy trivy-report.json \
              --security-report reports/security-report.md \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --source src/main/java \
              --config src/main/resources/application.yml \
              --output-dir reports/ || echo "Remediation agent failed - continuing"
          fi

      - name: 11. CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality
        continue-on-error: true

      - name: 11a. CodeQL Build
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          output: codeql-results.sarif
        continue-on-error: true

      - name: 12. Upload Reports & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-reports
          path: |
            reports/**
            target/site/jacoco/**
            target/surefire-reports/**
            trivy-report.json
            codeql-results.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: 12a. Upload CodeQL SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results.sarif
        continue-on-error: true

  deploy:
    name: Deploy to Production
    needs: build-test-coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 13. Deploy
        run: |
          echo "Build, test, coverage, security and codeql checks passed."
          echo "Deploying Employee Management service to production."
          # Replace with actual deployment steps (kubectl apply, helm upgrade, etc.)
          echo "::notice::Deployment simulated for demonstration pipeline."
