name: Enterprise Employee Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  NVIDIA_API_URL: "https://integrate.api.nvidia.com/v1/chat/completions"
  NVIDIA_MODEL: "meta/llama-3.1-70b-instruct"
  # SonarQube server URL. Configured as a repository variable so it can
  # differ per environment (dev / staging / prod) without code changes.
  # The fallback covers the case where Sonar runs in a Docker container
  # on the same runner.
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'http://sonarqube:9000' }}
  SONAR_PLUGIN_VERSION: "3.11.0.3922"

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Build
  # ----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: 4. Build (skip tests)
        run: mvn -B -ntp -DskipTests package

      - name: 5. Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/employee-management.jar
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------
  # JOB 2: Test & Coverage
  # ----------------------------------------------------------------------
  test-coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: 4. Run Unit Tests
        run: mvn -B -ntp test

      - name: 5. Generate JaCoCo Reports (HTML / XML / CSV)
        run: |
          mvn -B -ntp jacoco:report
          mvn -B -ntp jacoco:report -Dformat=csv
          mvn -B -ntp jacoco:report -Dformat=xml
        continue-on-error: false

      - name: 6. Coverage gate (>= 80%)
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            COVERAGE=$(awk -F, 'NR>1 && $1=="INSTRUCTION" && $4!="0" {print $4; exit}' target/site/jacoco/jacoco.csv)
            echo "Detected instruction coverage: $COVERAGE%"
            if [ -n "$COVERAGE" ]; then
              COVERAGE_INT=${COVERAGE%.*}
              if [ "$COVERAGE_INT" -lt 80 ]; then
                echo "::](#)
