name: Trivy Security Scan

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pom.xml'
      - 'src/**'
      - '.github/workflows/trivy-scan.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pom.xml'
      - 'src/**'
  schedule:
    # Run weekly to catch newly disclosed CVEs
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Fail the build if vulnerabilities of this severity or higher are found'
        required: false
        default: 'CRITICAL'
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          - UNKNOWN
      scan_target:
        description: 'What to scan'
        required: false
        default: 'image'
        type: choice
        options:
          - image
          - fs
          - rootfs
          - config

env:
  IMAGE_NAME: employee-management
  IMAGE_TAG: ${{ github.sha }}
  TRIVY_VERSION: '0.58.0'
  # Threshold driven by workflow_dispatch input, defaults to CRITICAL on push/PR
  SEVERITY_THRESHOLD: ${{ github.event.inputs.severity_threshold || 'CRITICAL' }}
  SCAN_TARGET: ${{ github.event.inputs.scan_target || 'image' }}

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Build the Docker image (needed to scan it)
  # ----------------------------------------------------------------------
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 3. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Compute image tag
        id: meta
        run: |
          echo "image-tag=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: 5. Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.image-tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ----------------------------------------------------------------------
  # JOB 2: Filesystem scan — source code, configs, secrets, IaC
  # ----------------------------------------------------------------------
  scan-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-fs-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          security-checks: 'vuln,secret,config'
          ignore-unfixed: true
          table-mode: true

      - name: 3. Generate JSON (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          security-checks: 'vuln,secret,config'
          ignore-unfixed: true

      - name: 4. Generate SARIF (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-report.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          security-checks: 'vuln,secret,config'
          ignore-unfixed: true

      - name: 5. Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-report.sarif
          category: trivy-fs

      - name: 6. Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-reports
          path: |
            trivy-fs-report.txt
            trivy-fs-report.json
            trivy-fs-report.sarif
          retention-days: 30
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # JOB 3: Docker image scan — OS packages + application JAR deps
  # ----------------------------------------------------------------------
  scan-image:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Run Trivy image scan (table)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.build.outputs.image-tag }}'
          format: 'table'
          output: 'trivy-image-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          ignore-unfixed: false
          vuln-type: 'os,library'
          table-mode: true

      - name: 3. Generate JSON (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.build.outputs.image-tag }}'
          format: 'json'
          output: 'trivy-image-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: 4. Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.build.outputs.image-tag }}'
          format: 'cyclonedx'
          output: 'trivy-image-sbom.cdx.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'

      - name: 5. Generate SARIF (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.build.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-image-report.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: 6. Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-report.sarif
          category: trivy-image

      - name: 7. Upload image reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-image-report.txt
            trivy-image-report.json
            trivy-image-sbom.cdx.json
            trivy-image-report.sarif
          retention-days: 30
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # JOB 4: Enforce severity threshold and publish the markdown report
  # ----------------------------------------------------------------------
  report-and-gate:
    name: Report & Severity Gate
    runs-on: ubuntu-latest
    needs: [build, scan-fs, scan-image]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: 1. Download image scan artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-reports
          path: trivy-image-reports

      - name: 2. Download filesystem scan artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-fs-reports
          path: trivy-fs-reports

      - name: 3. Install Trivy CLI
        uses: aquasecurity/trivy-action@0.28.0
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: 4. Summarize findings & build markdown report
        id: summarize
        run: |
          set -euo pipefail
          IMAGE_JSON="trivy-image-reports/trivy-image-report.json"
          FS_JSON="trivy-fs-reports/trivy-fs-report.json"
          TODAY="$(date -u +%Y-%m-%d)"
          COMMIT_SHORT="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # ---------- helpers ----------
          # Return counts for a given severity from a trivy JSON file.
          # Trivy JSON has shape: { Results: [ { Vulnerabilities: [ { Severity: ... } ] } ] }
          count_severity() {
            local file="$1"; local sev="$2"
            [ -f "$file" ] || { echo 0; return; }
            jq -r --arg s "$sev" '
              [ (.Results // [])[]
                | (.Vulnerabilities // [])
                | .[]?
                | select(.Severity == $s)
              ] | length
            ' "$file" 2>/dev/null || echo 0
          }

          fixed_unfixed() {
            local file="$1"; local sev="$2"
            [ -f "$file" ] || { echo "0|0"; return; }
            jq -r --arg s "$sev" '
              [ (.Results // [])[]
                | (.Vulnerabilities // [])
                | .[]?
                | select(.Severity == $s)
                | { fixed: (if .Status == null or .Status == "fixed" or .FixedVersion != null then 1 else 0 end) }
              ]
              | (map(select(.fixed == 1)) | length) as $f
              | (length - $f) as $u
              | "\($f)|\($u)"
            ' "$file" 2>/dev/null || echo "0|0"
          }

          # ---------- image counts ----------
          IMG_CRIT=$(count_severity "$IMAGE_JSON" "CRITICAL")
          IMG_HIGH=$(count_severity "$IMAGE_JSON" "HIGH")
          IMG_MED=$(count_severity  "$IMAGE_JSON" "MEDIUM")
          IMG_LOW=$(count_severity  "$IMAGE_JSON" "LOW")
          IMG_UNK=$(count_severity  "$IMAGE_JSON" "UNKNOWN")
          IMG_TOT=$((IMG_CRIT + IMG_HIGH + IMG_MED + IMG_LOW + IMG_UNK))

          # ---------- fs counts ----------
          FS_CRIT=$(count_severity "$FS_JSON" "CRITICAL")
          FS_HIGH=$(count_severity "$FS_JSON" "HIGH")
          FS_MED=$(count_severity  "$FS_JSON" "MEDIUM")
          FS_LOW=$(count_severity  "$FS_JSON" "LOW")
          FS_UNK=$(count_severity  "$FS_JSON" "UNKNOWN")
          FS_TOT=$((FS_CRIT + FS_HIGH + FS_MED + FS_LOW + FS_UNK))

          # ---------- fixed/unfixed for image ----------
          IFS='|' read -r IMG_FIXED_CRIT IMG_UNFIXED_CRIT <<< "$(fixed_unfixed "$IMAGE_JSON" "CRITICAL")"
          IFS='|' read -r IMG_FIXED_HIGH  IMG_UNFIXED_HIGH  <<< "$(fixed_unfixed "$IMAGE_JSON" "HIGH")"
          IFS='|' read -r IMG_FIXED_MED   IMG_UNFIXED_MED   <<< "$(fixed_unfixed "$IMAGE_JSON" "MEDIUM")"
          IFS='|' read -r IMG_FIXED_LOW   IMG_UNFIXED_LOW   <<< "$(fixed_unfixed "$IMAGE_JSON" "LOW")"

          # ---------- severity threshold evaluation ----------
          THRESHOLD="${{ env.SEVERITY_THRESHOLD }}"
          fail=0
          case "$THRESHOLD" in
            CRITICAL) [ "$IMG_CRIT" -gt 0 ] || [ "$FS_CRIT" -gt 0 ] && fail=1 ;;
            HIGH)     [ "$IMG_CRIT" -gt 0 ] || [ "$IMG_HIGH" -gt 0 ] || [ "$FS_CRIT" -gt 0 ] || [ "$FS_HIGH" -gt 0 ] && fail=1 ;;
            MEDIUM)   [ "$IMG_CRIT" -gt 0 ] || [ "$IMG_HIGH" -gt 0 ] || [ "$IMG_MED" -gt 0 ] || [ "$FS_CRIT" -gt 0 ] || [ "$FS_HIGH" -gt 0 ] || [ "$FS_MED" -gt 0 ] && fail=1 ;;
            LOW)      [ "$IMG_LOW" -gt 0 ] || [ "$FS_LOW" -gt 0 ] && fail=1 ;;
            UNKNOWN)  [ "$IMG_UNK" -gt 0 ] || [ "$FS_UNK" -gt 0 ] && fail=1 ;;
          esac
          if [ "$fail" -eq 1 ]; then
            echo "::error::Vulnerabilities at or above ${THRESHOLD} threshold detected — failing build."
          else
            echo "No vulnerabilities at or above ${THRESHOLD} threshold."
          fi

          # ---------- write markdown report ----------
          OUT="trivy-report.md"
          cat > "$OUT" <<EOF
          # Trivy Vulnerability Scan Report

          ## Scan Information

          | Field | Value |
          |---|---|
          | **Scanner** | Trivy v${{ env.TRIVY_VERSION }} |
          | **Scan Date** | ${TODAY} |
          | **Run** | [#${GITHUB_RUN_NUMBER}](${RUN_URL}) |
          | **Commit** | \`${COMMIT_SHORT}\` |
          | **Triggered By** | ${{ github.event_name }} |
          | **Severity Gate** | ${THRESHOLD} |
          | **Image** | \`${IMAGE_NAME}:${IMAGE_TAG}\` |

          ---

          ## Summary by Severity

          | Severity | Total | Fixed | Unfixed |
          |---|---|---|---|
          | 🔴 **CRITICAL** | $((IMG_CRIT + FS_CRIT)) | ${IMG_FIXED_CRIT} | ${IMG_UNFIXED_CRIT} |
          | 🟠 **HIGH**     | $((IMG_HIGH + FS_HIGH)) | ${IMG_FIXED_HIGH} | ${IMG_UNFIXED_HIGH} |
          | 🟡 **MEDIUM**   | $((IMG_MED + FS_MED))   | ${IMG_FIXED_MED}  | ${IMG_UNFIXED_MED}  |
          | 🔵 **LOW**      | $((IMG_LOW + FS_LOW))   | ${IMG_FIXED_LOW}  | ${IMG_UNFIXED_LOW}  |
          | ⚪ **UNKNOWN**  | $((IMG_UNK + FS_UNK))   | — | — |
          | **TOTAL**       | **$((IMG_TOT + FS_TOT))** | — | — |

          ## Summary by Target

          | Target | CRITICAL | HIGH | MEDIUM | LOW | UNKNOWN |
          |---|---|---|---|---|---|
          | Docker image (\`${IMAGE_NAME}\`) | ${IMG_CRIT} | ${IMG_HIGH} | ${IMG_MED} | ${IMG_LOW} | ${IMG_UNK} |
          | Filesystem (source + configs)   | ${FS_CRIT} | ${FS_HIGH} | ${FS_MED} | ${FS_LOW} | ${FS_UNK} |

          ---

          _Detailed per-CVE tables and full findings are available in the workflow artifacts:_
          - \`trivy-image-reports/trivy-image-report.txt\` (table)
          - \`trivy-image-reports/trivy-image-report.json\` (machine-readable)
          - \`trivy-image-reports/trivy-image-report.sarif\` (GitHub Security)
          - \`trivy-image-reports/trivy-image-sbom.cdx.json\` (CycloneDX SBOM)
          - \`trivy-fs-reports/trivy-fs-report.{txt,json,sarif}\`

          ---

          **Status:** $( [ "$fail" -eq 0 ] && echo "✅ Pass (no findings at/above **${THRESHOLD}**)" || echo "❌ Fail — vulnerabilities at/above **${THRESHOLD}** detected" )
          EOF

          echo "report_path=${OUT}" >> "$GITHUB_OUTPUT"
          echo "fail_gate=${fail}" >> "$GITHUB_OUTPUT"
          cat "$OUT"

      - name: 5. Upload markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.md
          retention-days: 90
          if-no-files-found: error

      - name: 6. Commit report back to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp trivy-report.md reports/trivy-report.md
          git add reports/trivy-report.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(security): update Trivy report [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: 7. Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('trivy-report.md', 'utf8');
            const truncated = report.length > 60000
              ? report.slice(0, 60000) + '\n\n_…report truncated; see workflow artifacts for full output._'
              : report;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: truncated
            });

      - name: 8. Fail the build on threshold breach
        if: steps.summarize.outputs.fail_gate == '1'
        run: |
          echo "::error::Severity gate (${{ env.SEVERITY_THRESHOLD }}) breached. See trivy-report.md artifact."
          exit 1